<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng Tiếng Anh C1/C2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

.header { background: #1a1a2e; color: white; padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.header h1 { font-size: 22px; font-weight: 600; }
.header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.badge { background: #4CAF50; color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

.controls { background: white; border-bottom: 1px solid #e8e8e0; padding: 1rem 2rem; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.search-wrap input:focus { border-color: #1a1a2e; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #999; font-size: 16px; }
select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; outline: none; cursor: pointer; }
.btn-mode { padding: 8px 16px; border: 1px solid #1a1a2e; border-radius: 8px; font-size: 13px; cursor: pointer; background: white; transition: all 0.2s; }
.btn-mode.active { background: #1a1a2e; color: white; }

.stats { display: flex; gap: 8px; padding: 1rem 2rem; background: white; border-bottom: 1px solid #e8e8e0; flex-wrap: wrap; }
.stat { background: #f5f5f0; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #555; }
.stat span { font-weight: 600; color: #1a1a2e; }

.main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

.word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

.word-card { background: white; border-radius: 12px; border: 1px solid #e8e8e0; overflow: hidden; transition: box-shadow 0.2s; }
.word-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

.card-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid #f0f0e8; display: flex; justify-content: space-between; align-items: flex-start; }
.word-main { flex: 1; }
.word-en { font-size: 20px; font-weight: 600; color: #1a1a2e; }
.word-phonetic { font-size: 13px; color: #888; margin-top: 2px; font-style: italic; }
.word-vi { font-size: 14px; color: #2e7d32; font-weight: 500; margin-top: 4px; }
.level-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
.level-c1 { background: #e3f2fd; color: #1565c0; }
.level-c2 { background: #fce4ec; color: #880e4f; }

.meanings { padding: 0.75rem 1.25rem; }
.meaning-item { margin-bottom: 0.75rem; }
.meaning-item:last-child { margin-bottom: 0; }
.pos-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-bottom: 4px; }
.pos-n { background: #fff3e0; color: #e65100; }
.pos-v { background: #e8f5e9; color: #2e7d32; }
.pos-adj { background: #e8eaf6; color: #283593; }
.pos-adv { background: #fce4ec; color: #880e4f; }
.pos-phrase { background: #f3e5f5; color: #6a1b9a; }

.meaning-vi { font-size: 14px; color: #333; margin-bottom: 6px; }
.examples { list-style: none; }
.examples li { font-size: 13px; color: #555; padding: 4px 0 4px 12px; border-left: 2px solid #e0e0e0; margin-bottom: 4px; line-height: 1.5; }
.examples li em { color: #1565c0; font-style: normal; font-weight: 500; }
.examples li .vi-ex { display: block; color: #888; font-size: 12px; margin-top: 2px; }

.card-footer { padding: 0.5rem 1.25rem; background: #fafaf8; border-top: 1px solid #f0f0e8; display: flex; gap: 8px; }
.btn-learn { flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; background: white; transition: all 0.2s; }
.btn-learn:hover { background: #f5f5f0; }
.btn-learn.mastered { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
.btn-learn.studying { background: #fff3e0; border-color: #ffcc80; color: #e65100; }

.empty { text-align: center; padding: 3rem; color: #888; }
.empty i { font-size: 48px; margin-bottom: 1rem; display: block; }

/* Flashcard mode */
.flashcard-mode { display: none; text-align: center; max-width: 600px; margin: 2rem auto; }
.flashcard-mode.active { display: block; }
.word-grid.hidden { display: none; }

.flashcard { background: white; border-radius: 16px; border: 1px solid #e8e8e0; padding: 2.5rem; min-height: 300px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: all 0.3s; }
.flashcard:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.fc-word { font-size: 36px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
.fc-phonetic { font-size: 16px; color: #888; font-style: italic; }
.fc-level { margin-top: 12px; }
.fc-reveal { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #f0f0e8; display: none; }
.fc-reveal.show { display: block; }
.fc-vi { font-size: 20px; color: #2e7d32; font-weight: 600; margin-bottom: 1rem; }
.fc-example { font-size: 14px; color: #555; font-style: italic; }
.fc-nav { display: flex; gap: 12px; margin-top: 1.5rem; justify-content: center; }
.fc-nav button { padding: 10px 24px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.fc-nav .btn-know { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
.fc-nav .btn-again { background: #fff3e0; border-color: #ffcc80; color: #e65100; }
.fc-nav .btn-prev { background: white; }
.fc-progress { font-size: 13px; color: #888; margin-bottom: 1rem; }
.fc-hint { font-size: 13px; color: #bbb; margin-top: 1rem; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 Từ vựng Tiếng Anh C1 / C2</h1>
    <p>Học từ vựng nâng cao với nghĩa tiếng Việt và ví dụ theo từng loại từ</p>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <span class="badge">C1</span>
    <span class="badge" style="background:#e91e63;">C2</span>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Tìm từ vựng..." oninput="filterWords()">
  </div>
  <select id="levelFilter" onchange="filterWords()">
    <option value="all">Tất cả cấp độ</option>
    <option value="C1">C1</option>
    <option value="C2">C2</option>
  </select>
  <select id="posFilter" onchange="filterWords()">
    <option value="all">Tất cả loại từ</option>
    <option value="noun">Danh từ (n)</option>
    <option value="verb">Động từ (v)</option>
    <option value="adjective">Tính từ (adj)</option>
    <option value="adverb">Trạng từ (adv)</option>
  </select>
  <button class="btn-mode active" id="btnGrid" onclick="setMode('grid')">📋 Danh sách</button>
  <button class="btn-mode" id="btnFlash" onclick="setMode('flash')">🃏 Flashcard</button>
</div>

<div class="stats" id="statsBar">
  <div class="stat">Tổng: <span id="totalCount">0</span> từ</div>
  <div class="stat">Đang hiển thị: <span id="showCount">0</span> từ</div>
  <div class="stat">Đã thuộc: <span id="masteredCount">0</span> từ</div>
  <div class="stat">Đang học: <span id="studyingCount">0</span> từ</div>
</div>

<div class="main">
  <div class="word-grid" id="wordGrid"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <i>🔍</i>
    <p>Không tìm thấy từ vựng phù hợp</p>
  </div>

  <div class="flashcard-mode" id="flashcardMode">
    <div class="fc-progress" id="fcProgress">Từ 1 / 10</div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="fc-word" id="fcWord">—</div>
      <div class="fc-phonetic" id="fcPhonetic">—</div>
      <div class="fc-level" id="fcLevel"></div>
      <div class="fc-reveal" id="fcReveal">
        <div class="fc-vi" id="fcVi"></div>
        <div class="fc-example" id="fcExample"></div>
      </div>
      <div class="fc-hint" id="fcHint">👆 Nhấn để xem nghĩa</div>
    </div>
    <div class="fc-nav" id="fcNav" style="display:none;">
      <button class="btn-again" onclick="markCard('again')">🔄 Học lại</button>
      <button class="btn-know" onclick="markCard('know')">✅ Đã thuộc</button>
    </div>
    <div class="fc-nav">
      <button class="btn-prev" onclick="prevCard()">← Trước</button>
      <button class="btn-prev" onclick="nextCard()">Tiếp →</button>
    </div>
  </div>
</div>

          { en: "His rude comments only <em>exacerbated</em> the conflict.", vi: "Những bình luận thô lỗ của anh ấy chỉ làm xung đột tồi tệ hơn." }

let statusMap = {};
let currentFiltered = [...words];
let fcIndex = 0;
let fcRevealed = false;

function getPosClass(pos) {
  if (pos === 'noun') return 'pos-n';
  if (pos === 'verb') return 'pos-v';
  if (pos === 'adjective') return 'pos-adj';
  if (pos === 'adverb') return 'pos-adv';
  return 'pos-phrase';
}

function getPosLabel(pos) {
  if (pos === 'noun') return 'n.';
  if (pos === 'verb') return 'v.';
  if (pos === 'adjective') return 'adj.';
  if (pos === 'adverb') return 'adv.';
  return pos;
}

function renderCards(list) {
  const grid = document.getElementById('wordGrid');
  const empty = document.getElementById('emptyState');
  if (list.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(w => {
    const st = statusMap[w.word] || 'none';
    const masteredClass = st === 'mastered' ? 'mastered' : st === 'studying' ? 'studying' : '';
    const masteredLabel = st === 'mastered' ? '✅ Đã thuộc' : st === 'studying' ? '🔄 Đang học' : '📖 Thêm vào danh sách học';
    return `
    <div class="word-card">
      <div class="card-header">
        <div class="word-main">
          <div class="word-en">${w.word}</div>
          <div class="word-phonetic">${w.phonetic}</div>
          <div class="word-vi">${w.meanings.map(m => m.vi).join(' · ').substring(0, 50)}...</div>
        </div>
        <span class="level-badge ${w.level === 'C1' ? 'level-c1' : 'level-c2'}">${w.level}</span>
      </div>
      <div class="meanings">
        ${w.meanings.map(m => `
          <div class="meaning-item">
            <span class="pos-tag ${getPosClass(m.pos)}">${getPosLabel(m.pos)}</span>
            <div class="meaning-vi">${m.vi}</div>
            <ul class="examples">
              ${m.examples.map(ex => `
                <li>${ex.en}<span class="vi-ex">${ex.vi}</span></li>
              `).join('')}
            </ul>
          </div>
        `).join('')}
      </div>
      <div class="card-footer">
        <button class="btn-learn ${masteredClass}" onclick="toggleStatus('${w.word}', this)">${masteredLabel}</button>
      </div>
    </div>`;
  }).join('');
  updateStats(list);
}

function toggleStatus(word, btn) {
  const cur = statusMap[word] || 'none';
  if (cur === 'none') { statusMap[word] = 'studying'; btn.textContent = '🔄 Đang học'; btn.className = 'btn-learn studying'; }
  else if (cur === 'studying') { statusMap[word] = 'mastered'; btn.textContent = '✅ Đã thuộc'; btn.className = 'btn-learn mastered'; }
  else { delete statusMap[word]; btn.textContent = '📖 Thêm vào danh sách học'; btn.className = 'btn-learn'; }
  updateStats(currentFiltered);
}

function updateStats(list) {
  document.getElementById('totalCount').textContent = words.length;
  document.getElementById('showCount').textContent = list.length;
  document.getElementById('masteredCount').textContent = Object.values(statusMap).filter(v => v === 'mastered').length;
  document.getElementById('studyingCount').textContent = Object.values(statusMap).filter(v => v === 'studying').length;
}

function filterWords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const level = document.getElementById('levelFilter').value;
  const pos = document.getElementById('posFilter').value;
  currentFiltered = words.filter(w => {
    const matchQ = !q || w.word.includes(q) || w.meanings.some(m => m.vi.toLowerCase().includes(q));
    const matchL = level === 'all' || w.level === level;
    const matchP = pos === 'all' || w.meanings.some(m => m.pos === pos);
    return matchQ && matchL && matchP;
  });
  renderCards(currentFiltered);
  if (document.getElementById('btnFlash').classList.contains('active')) loadFlashcard();
}

function setMode(mode) {
  const grid = document.getElementById('wordGrid');
  const flash = document.getElementById('flashcardMode');
  const empty = document.getElementById('emptyState');
  if (mode === 'grid') {
    grid.classList.remove('hidden');
    flash.classList.remove('active');
    document.getElementById('btnGrid').classList.add('active');
    document.getElementById('btnFlash').classList.remove('active');
    renderCards(currentFiltered);
  } else {
    grid.classList.add('hidden');
    empty.style.display = 'none';
    flash.classList.add('active');
    document.getElementById('btnFlash').classList.add('active');
    document.getElementById('btnGrid').classList.remove('active');
    fcIndex = 0;
    loadFlashcard();
  }
}

function loadFlashcard() {
  if (currentFiltered.length === 0) return;
  const w = currentFiltered[fcIndex];
  fcRevealed = false;
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcPhonetic').textContent = w.phonetic;
  document.getElementById('fcLevel').innerHTML = `<span class="level-badge ${w.level === 'C1' ? 'level-c1' : 'level-c2'}">${w.level}</span>`;
  document.getElementById('fcReveal').classList.remove('show');
  document.getElementById('fcNav').style.display = 'none';
  document.getElementById('fcHint').style.display = 'block';
  document.getElementById('fcProgress').textContent = `Từ ${fcIndex + 1} / ${currentFiltered.length}`;
  const m = w.meanings[0];
  document.getElementById('fcVi').textContent = m.vi;
  document.getElementById('fcExample').textContent = m.examples[0].en.replace(/<[^>]+>/g, '');
}

function revealCard() {
  if (fcRevealed) return;
  fcRevealed = true;
  document.getElementById('fcReveal').classList.add('show');
  document.getElementById('fcNav').style.display = 'flex';
  document.getElementById('fcHint').style.display = 'none';
}

function markCard(result) {
  const w = currentFiltered[fcIndex];
  if (result === 'know') statusMap[w.word] = 'mastered';
  else statusMap[w.word] = 'studying';
  nextCard();
}

function nextCard() {
  if (fcIndex < currentFiltered.length - 1) { fcIndex++; loadFlashcard(); }
  else { fcIndex = 0; loadFlashcard(); }
}

function prevCard() {
  if (fcIndex > 0) { fcIndex--; loadFlashcard(); }
}

renderCards(words);
</script>
